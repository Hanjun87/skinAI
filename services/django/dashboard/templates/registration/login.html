<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkinAI Django 登录</title>
    <style>
      * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f3f4f6; color: #111827; }
      .card { width: min(420px, calc(100vw - 32px)); background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; padding: 24px; }
      h1 { margin: 0 0 8px; font-size: 26px; }
      p { margin: 0 0 20px; color: #4b5563; }
      label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; }
      input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 14px; margin-bottom: 16px; }
      button { width: 100%; border: none; border-radius: 10px; background: #2563eb; color: #fff; padding: 12px; font-size: 14px; cursor: pointer; }
      .errorlist { color: #dc2626; margin: 0 0 16px; padding-left: 18px; }
      .help { margin-top: 16px; font-size: 13px; color: #6b7280; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>SkinAI</h1>
      <p>使用 Django 账号登录管理控制台</p>
      <form method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <label for="{{ form.username.id_for_label }}">用户名</label>
        {{ form.username }}
        <label for="{{ form.password.id_for_label }}">密码</label>
        {{ form.password }}
        <button type="submit">登录</button>
      </form>
      <div class="help">本地初始化后默认账号为 admin / admin，生产环境请立即修改。</div>
    </main>
  </body>
</html>
